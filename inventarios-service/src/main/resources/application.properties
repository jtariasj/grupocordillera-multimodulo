spring.application.name=inventarios-service

server.port=8083
spring.datasource.url=jdbc:mysql://localhost:3306/grupocordillera_inventarios?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.placeholders.schema_name=my_app_schema

spring.jpa.hibenate.ddl-auto=none
spring.jpa.show-sql=true
spring.ja.properties.hibernate.format_sql=true

eureka.client.eureka-server-http-client-name=RestClient

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

management.endpoints.web.exposure.include=health,info

management.info.env.enabled=true

info.app.name=Microservicio Gestion Inventarios
info.app.description= Modulo para el manejo de Productos y Categorias
info.app.version=1.0.0